[build]
  publish = "."
  functions = "netlify/functions"

# 讓 /account 與 /account/ 都進 dashboard
[[redirects]]
  from = "/account"
  to = "/account/index.html"
  status = 301

[[redirects]]
  from = "/account/"
  to = "/account/index.html"
  status = 301

# API functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/ai/*.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
